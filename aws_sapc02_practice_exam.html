<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAP-C02 Practice Exam</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #1f2d45;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --accent3: #10b981;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --correct: #10b981;
    --correct-bg: rgba(16,185,129,0.1);
    --correct-border: rgba(16,185,129,0.35);
    --wrong: #ef4444;
    --wrong-bg: rgba(239,68,68,0.1);
    --wrong-border: rgba(239,68,68,0.35);
    --reveal-bg: rgba(16,185,129,0.08);
    --reveal-border: rgba(16,185,129,0.3);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .shell { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    flex-wrap: wrap; gap: 12px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 13px; font-weight: 600; color: #000;
  }
  .logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
  .header-stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px;
    font-size: 12px; font-family: var(--mono); color: var(--text2);
  }
  .stat-pill span { color: var(--accent); font-weight: 600; }

  /* Progress */
  .progress-wrap { margin-bottom: 24px; }
  .progress-labels { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 12px; font-family: var(--mono); color: var(--text3); }
  .progress-track {
    height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .filter-btn {
    font-family: var(--mono); font-size: 11px; padding: 5px 12px;
    border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: var(--border2); }
  .q-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px;
  }
  .q-num {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: #000; background: var(--accent);
    border-radius: 5px; padding: 3px 9px; flex-shrink: 0; margin-top: 1px;
  }
  .q-meta { flex: 1; }
  .q-domain {
    font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent2); font-weight: 600; margin-bottom: 3px;
  }
  .q-status-badge {
    font-size: 10px; font-family: var(--mono); padding: 2px 8px;
    border-radius: 4px; float: right; margin-top: 2px;
  }
  .status-unanswered { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }
  .status-correct { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct-border); }
  .status-wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong-border); }

  /* Scenario */
  .q-scenario {
    margin: 14px 20px 0;
    padding: 12px 16px;
    background: var(--surface2);
    border-left: 3px solid var(--accent2);
    border-radius: 0 6px 6px 0;
    font-size: 13px; color: var(--text2); line-height: 1.65;
  }
  .scenario-label {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--accent2); font-weight: 600;
    margin-bottom: 6px;
  }

  .q-question {
    padding: 14px 20px 6px;
    font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.6;
  }

  /* Options */
  .q-options { padding: 4px 20px 16px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px; margin-bottom: 8px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer;
    transition: all 0.15s; font-size: 13px; color: var(--text2);
    line-height: 1.55;
  }
  .opt:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
  .opt-letter {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid var(--border2); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin-top: 1px;
    color: var(--text3); background: var(--surface); transition: all 0.15s;
  }
  .opt.correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct); cursor: default; }
  .opt.correct .opt-letter { background: var(--correct); color: #fff; border-color: var(--correct); }
  .opt.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong); cursor: default; }
  .opt.wrong .opt-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  .opt.reveal { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct); cursor: default; }
  .opt.reveal .opt-letter { background: var(--correct); color: #fff; border-color: var(--correct); }
  .opt.disabled { cursor: default; pointer-events: none; }
  .opt-icon { margin-left: auto; flex-shrink: 0; font-size: 14px; }

  /* Explanation */
  .explanation {
    margin: 0 20px 16px;
    padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text2); line-height: 1.65;
    display: none; animation: fadeIn 0.3s ease;
  }
  .explanation.show { display: block; }
  .exp-label {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--accent); font-weight: 600; margin-bottom: 8px;
  }
  .exp-correct { color: var(--correct); font-weight: 600; }
  .exp-body { color: var(--text2); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* Score panel */
  .score-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px; text-align: center;
    margin-bottom: 24px; display: none;
  }
  .score-panel.show { display: block; }
  .score-big { font-size: 72px; font-weight: 700; font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
  .score-grade { font-size: 18px; color: var(--text2); margin-bottom: 24px; }
  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .score-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .score-stat .val { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .score-stat .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); margin-top: 3px; }
  .reset-btn {
    font-family: var(--mono); font-size: 13px; padding: 11px 28px;
    border-radius: 7px; border: none; background: var(--accent);
    color: #000; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .reset-btn:hover { opacity: 0.85; }

  /* Sticky top nav */
  .sticky-nav {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,14,26,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; gap: 12px; align-items: center;
    margin-bottom: 28px;
  }
  .sticky-score {
    font-family: var(--mono); font-size: 12px; color: var(--text2);
    margin-left: auto;
  }
  .sticky-score b { color: var(--accent); }

  /* Tags */
  .domain-tag {
    display: inline-block; font-size: 10px; font-family: var(--mono);
    padding: 2px 8px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* Section */
  .section-label {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--text3); margin: 32px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  @media (max-width: 600px) {
    .score-grid { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">AWS</div>
      <div>
        <div class="logo-text">SAP-C02 Practice Exam</div>
        <div class="logo-sub">Solutions Architect Professional · 50 Questions</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">Total &nbsp;<span id="total-count">50</span></div>
      <div class="stat-pill">Answered &nbsp;<span id="ans-count">0</span></div>
      <div class="stat-pill">Score &nbsp;<span id="score-count">0%</span></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span id="prog-label">0 / 50 answered</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="score-panel" class="score-panel">
    <div class="score-big" id="final-pct">-</div>
    <div class="score-grade" id="final-grade">-</div>
    <div class="score-grid">
      <div class="score-stat"><div class="val" id="fs-correct" style="color:var(--correct)">0</div><div class="lbl">Correct</div></div>
      <div class="score-stat"><div class="val" id="fs-wrong" style="color:var(--wrong)">0</div><div class="lbl">Wrong</div></div>
      <div class="score-stat"><div class="val" id="fs-skip" style="color:var(--text3)">0</div><div class="lbl">Skipped</div></div>
      <div class="score-stat"><div class="val" id="fs-pct" style="color:var(--accent)">0%</div><div class="lbl">Accuracy</div></div>
    </div>
    <button class="reset-btn" onclick="resetExam()">↺ &nbsp;Restart Exam</button>
  </div>

  <div id="questions-container"></div>

</div>

<script>
const questions = [
  // ── ON-PREMISES & HYBRID ──────────────────────────────
  {
    domain:"Hybrid Connectivity",
    type:"hybrid",
    scenario:"A manufacturing company has 10 Gbps of data flowing between its on-premises data centre and AWS every day. They currently use a Site-to-Site VPN but are experiencing high latency and packet loss affecting their ERP system.",
    question:"Which solution provides the MOST reliable and consistent network performance between on-premises and AWS?",
    options:["Upgrade to multiple Site-to-Site VPNs in ECMP configuration to increase bandwidth.","Provision AWS Direct Connect with a dedicated 10 Gbps connection and configure a private virtual interface (VIF) to the VPC.","Use AWS DataSync over the existing VPN to optimise data transfer.","Deploy an AWS Storage Gateway in the on-premises data centre to cache frequently accessed data."],
    correct:1,
    explanation:"AWS Direct Connect provides a dedicated private network connection from on-premises to AWS, bypassing the public internet entirely. A 10 Gbps dedicated connection eliminates the latency and packet loss inherent to internet-based VPN tunnels. A private VIF then connects directly to the VPC. Option A (ECMP VPN) still traverses the public internet. Option C (DataSync) is a data transfer service, not a network solution. Option D (Storage Gateway) caches data locally but doesn't fix the connectivity issue."
  },
  {
    domain:"Migration Strategy",
    type:"hybrid",
    scenario:"A bank runs 2,000 virtual machines on-premises using VMware vSphere. The CTO wants to migrate to AWS over 18 months with minimal disruption. The team has no AWS expertise and wants to continue using VMware operational tooling during the transition.",
    question:"Which migration approach requires the LEAST re-training and operational change during the transition period?",
    options:["Use AWS Application Migration Service (MGN) to lift and shift all VMs to EC2 immediately.","Deploy VMware Cloud on AWS, migrate VMs using vMotion, then gradually modernise workloads.","Use AWS SMS (Server Migration Service) to replicate and convert all VMware VMs to AMIs.","Re-platform all applications to containers using AWS App2Container before migration."],
    correct:1,
    explanation:"VMware Cloud on AWS allows the bank to run VMware workloads natively on dedicated AWS infrastructure using the same VMware tools (vCenter, vSphere, NSX). Teams can use vMotion for live migration with zero downtime and continue using familiar operational tooling while gradually modernising. Option A (MGN) requires immediate re-platforming and AWS operational knowledge. Option C (SMS) converts VMs to AMIs, losing VMware tooling compatibility. Option D (App2Container) is a major re-platforming effort requiring significant expertise."
  },
  {
    domain:"Disaster Recovery",
    type:"hybrid",
    scenario:"A hospital has a critical patient records system running on-premises. Regulations require data to remain on-premises, but the hospital wants cloud-based DR with an RTO of 4 hours and RPO of 1 hour. Budget is limited.",
    question:"Which DR strategy meets the requirements at the LOWEST cost?",
    options:["Pilot Light: Replicate data to AWS using AWS Storage Gateway, keep minimal AWS resources running, scale up during a disaster.","Warm Standby: Run a scaled-down version of the system on EC2 with RDS Multi-AZ at all times.","Active-Active: Run the full system in both on-premises and AWS simultaneously.","Backup and Restore: Use AWS Backup to snapshot on-premises data to S3 every hour, restore to EC2 when needed."],
    correct:0,
    explanation:"Pilot Light is the optimal choice for a 4-hour RTO and 1-hour RPO on a limited budget. Storage Gateway continuously replicates data to AWS (satisfying the 1-hour RPO). During a disaster, minimal pre-provisioned AWS resources (database, AMIs) are 'lit up' and scaled to full capacity within 4 hours. Option B (Warm Standby) costs more due to always-running resources. Option C (Active-Active) is the most expensive. Option D (Backup and Restore) typically achieves RTO of hours to days, and restoring from scratch may exceed the 4-hour RTO."
  },
  {
    domain:"Storage Gateway",
    type:"hybrid",
    scenario:"A media company stores 500 TB of video archives on-premises on NAS. Editors frequently access files from the last 30 days, but older content is rarely accessed. They want to move to AWS while maintaining low-latency access for recent files.",
    question:"Which AWS Storage Gateway configuration is MOST appropriate?",
    options:["Volume Gateway in stored mode — stores all data on-premises with async backups to S3.","Volume Gateway in cached mode — primary data in S3, frequently accessed data cached locally.","File Gateway — presents S3 as an NFS/SMB share, with a local cache for recently accessed objects.","Tape Gateway — replaces physical tape with virtual tapes stored in S3 Glacier."],
    correct:2,
    explanation:"File Gateway is ideal for NAS replacement scenarios. It presents S3 as a standard NFS/SMB file share that editors can access using existing tools. Frequently accessed files (last 30 days) are served from the local cache providing low latency. Older files are retrieved from S3 transparently. Option A (Volume, stored mode) keeps all data on-premises, not offloading storage to AWS. Option B (Volume, cached mode) works at block level, not file level — incompatible with NAS workflows. Option D (Tape Gateway) is for backup/archival use cases, not active file access."
  },
  {
    domain:"Direct Connect",
    type:"hybrid",
    scenario:"An enterprise uses AWS Direct Connect (1 Gbps) for its primary on-premises connection. They need a cost-effective backup path that activates automatically if Direct Connect fails, without provisioning a second Direct Connect circuit.",
    question:"What is the MOST cost-effective high-availability configuration?",
    options:["Order a second 1 Gbps Direct Connect circuit from a different Direct Connect location as a backup.","Configure a Site-to-Site VPN as a backup path, use BGP with lower local preference on the VPN so Direct Connect is always preferred.","Use AWS Transit Gateway with route propagation to automatically failover to a regional VPN.","Deploy a software VPN on EC2 using OpenVPN to create a backup tunnel."],
    correct:1,
    explanation:"A Site-to-Site VPN as a Direct Connect backup is the standard AWS-recommended approach. BGP is used to set route preference: Direct Connect routes are preferred (higher local preference or more specific routes), and the VPN automatically becomes the active path if Direct Connect fails. This is highly cost-effective as VPN charges are minimal compared to a second Direct Connect circuit. Option A works but is significantly more expensive. Option C adds Transit Gateway cost unnecessarily. Option D requires managing EC2 instances and is not production-grade without significant engineering effort."
  },
  {
    domain:"Identity Federation",
    type:"hybrid",
    scenario:"A company uses Microsoft Active Directory on-premises with 5,000 users. They are adopting AWS services and need employees to use their existing AD credentials to access the AWS Console and CLI without creating separate IAM users.",
    question:"Which solution enables SSO to AWS using existing AD credentials with the LEAST ongoing maintenance?",
    options:["Create IAM users for each AD user and configure password sync manually.","Deploy an ADFS server on-premises and configure SAML federation with AWS IAM Identity Center.","Use AWS Directory Service (AD Connector) with AWS IAM Identity Center to proxy authentication to on-premises AD and assign permission sets.","Deploy AWS Managed Microsoft AD in AWS and establish a forest trust with on-premises AD."],
    correct:2,
    explanation:"AD Connector + IAM Identity Center is the lowest-maintenance approach. AD Connector acts as a proxy, forwarding authentication requests to the on-premises AD without syncing any directory data to AWS. IAM Identity Center provides the SSO portal and assigns permission sets (equivalent to IAM roles) to AD groups. No ADFS infrastructure is needed. Option A is the worst approach — 5,000 IAM users are unmanageable. Option B (ADFS) requires deploying, patching, and maintaining ADFS servers. Option D creates a full AD replica in AWS — higher cost and operational overhead than AD Connector."
  },
  {
    domain:"Data Transfer",
    type:"hybrid",
    scenario:"A genomics company needs to transfer 2 PB of sequencing data from on-premises to Amazon S3 for analysis. Their internet connection is 1 Gbps. They need the transfer completed within 2 weeks.",
    question:"What is the FASTEST and MOST practical data transfer method?",
    options:["Use AWS DataSync over the 1 Gbps internet connection — 2 PB will transfer in approximately 18 days.","Order multiple AWS Snowball Edge Storage Optimised devices, load data in parallel, ship to AWS.","Upgrade the internet connection to 10 Gbps and use DataSync.","Use S3 Transfer Acceleration over the existing 1 Gbps connection."],
    correct:1,
    explanation:"2 PB over 1 Gbps at 100% utilisation would take ~185 days — not 18. Multiple Snowball Edge devices (each 80 TB usable) can be loaded in parallel on-premises, then shipped to AWS for ingest into S3. With ~25 devices and parallel loading, this is achievable in 2 weeks. Option A is mathematically impossible within 2 weeks. Option C — upgrading to 10 Gbps takes weeks to provision and still takes ~18 days at full utilisation. Option D (Transfer Acceleration) optimises internet transfers but doesn't overcome the fundamental bandwidth constraint for 2 PB."
  },
  {
    domain:"Outposts",
    type:"hybrid",
    scenario:"A financial trading firm requires sub-millisecond latency for its matching engine. Regulations require data to stay within a specific physical data centre. They want to use AWS services but cannot tolerate the latency to an AWS region.",
    question:"Which AWS service allows them to run AWS infrastructure inside their own data centre?",
    options:["AWS Local Zones — extend AWS to metro areas closer to end users.","AWS Wavelength — deploy infrastructure at 5G network edges.","AWS Outposts — rack-and-stack AWS infrastructure on-premises in the customer's data centre.","AWS Direct Connect — dedicated private connectivity reducing latency to the AWS region."],
    correct:2,
    explanation:"AWS Outposts delivers AWS-managed compute and storage hardware installed within the customer's own data centre. This provides genuine AWS services (EC2, EBS, RDS, EKS) running locally with single-digit millisecond latency, while data remains physically on-premises satisfying regulatory requirements. Option A (Local Zones) extends AWS to metro areas but data still leaves the customer's premises. Option B (Wavelength) targets 5G edge use cases. Option D (Direct Connect) reduces latency to the AWS region but doesn't meet sub-millisecond requirements or keep data in-premises."
  },
  {
    domain:"Backup & Recovery",
    type:"hybrid",
    scenario:"A retail company uses on-premises tape backups managed by Veeam. Tapes are stored off-site but retrieval takes 24–48 hours. They want to replace tapes with cloud-based backups while keeping Veeam as the backup software.",
    question:"Which AWS solution integrates with Veeam and replaces off-site tape storage?",
    options:["Configure Veeam to back up directly to Amazon S3 using the S3-compatible endpoint.","Deploy AWS Storage Gateway Tape Gateway, present virtual tapes to Veeam, backed by S3 and S3 Glacier.","Use AWS Backup with a Veeam plug-in to centralise backups.","Replicate Veeam backup files to AWS using AWS DataSync."],
    correct:1,
    explanation:"AWS Tape Gateway presents iSCSI virtual tape library (VTL) interfaces that Veeam treats as a standard tape library — no software changes needed. Active virtual tapes are stored in S3; archived tapes move to S3 Glacier or Glacier Deep Archive (replacing physical off-site tape). Retrieval is much faster than physical tape (hours for Glacier, seconds for S3). Option A requires Veeam to write directly to S3, which requires additional Veeam licensing/configuration and doesn't replicate the tape workflow. Option C — AWS Backup does not have native Veeam integration. Option D syncs files but doesn't integrate with Veeam's tape-based backup workflow."
  },
  {
    domain:"Network Security",
    type:"hybrid",
    scenario:"A defence contractor has highly sensitive workloads on-premises and wants to allow only specific AWS services to communicate with their network via Direct Connect. They need encryption in transit and must ensure traffic never traverses the public internet.",
    question:"Which configuration meets ALL requirements?",
    options:["Use a public VIF on Direct Connect and whitelist the AWS service IP ranges in on-premises firewalls.","Use a private VIF on Direct Connect to a VPC, use VPC endpoints (PrivateLink) for AWS services, and enable MACsec on the Direct Connect connection for encryption.","Use a transit VIF on Direct Connect to AWS Transit Gateway, with all traffic encrypted using IPsec.","Use a Site-to-Site VPN over Direct Connect (VPN over DX) with a private VIF for encryption."],
    correct:1,
    explanation:"Private VIF + VPC PrivateLink endpoints + MACsec is the most comprehensive solution. Private VIF keeps traffic on the Direct Connect private path. VPC endpoints (PrivateLink) allow AWS services to be accessed from the VPC without traversing the internet. MACsec provides Layer 2 link encryption on the Direct Connect connection itself, encrypting data in transit end-to-end on the private circuit. Option A (public VIF) routes traffic over the public AWS backbone, which violates the 'never public internet' requirement. Option C uses Transit Gateway but IPsec over DX adds complexity; MACsec is more elegant. Option D (VPN over DX) is valid for encryption but requires maintaining VPN tunnels."
  },

  // ── CLOUD-NATIVE ARCHITECTURE ──────────────────────────
  {
    domain:"High Availability",
    type:"cloud",

    options:["Increase Lambda concurrency limit and switch DynamoDB to on-demand capacity mode.","Deploy Lambda functions on EC2 with Auto Scaling to handle the spike, and add ElastiCache in front of DynamoDB.","Use SQS to buffer order events before Lambda, and switch DynamoDB to on-demand capacity mode.","Pre-scale DynamoDB provisioned capacity before Black Friday using scheduled Auto Scaling."],

  {

    question:"Which architecture makes order processing resilient to individual downstream service failures?",
    options:["Use Amazon SQS with a single queue — all downstream services poll from the same queue.","Use Amazon SNS to publish order events, with separate SQS queues subscribed for each downstream service (fan-out pattern).","Use Amazon EventBridge to route order events directly to downstream service Lambda functions.","Use Amazon MQ (ActiveMQ) to replace the synchronous calls with message-passing."],

    explanation:"SNS + SQS fan-out is the canonical AWS pattern for this scenario. SNS publishes the order event once; each downstream service (inventory, billing, shipping, analytics) has its own SQS queue subscribed to the SNS topic. If billing is down, its SQS queue accumulates messages — other services continue processing unaffected. Orders are never lost. Option A (single SQS queue) means each message is processed by only one consumer — all services cannot each process every order. Option C (EventBridge + Lambda) is valid but if billing Lambda fails repeatedly, messages go to DLQ — SNS/SQS provides better guaranteed delivery. Option D (Amazon MQ) adds operational overhead."

    options:["Load all data into Amazon RDS Aurora and run SQL queries directly.","Store data in Amazon S3 in Parquet format with Snappy compression, partitioned by date, and query with Amazon Athena.","Load data into Amazon Redshift with sort keys on date columns.","Use Amazon OpenSearch Service with date-based index rotation."],

    options:["Export Oracle data to CSV, upload to S3, import into Aurora PostgreSQL — estimated 8–16 hours of downtime.","Use AWS Schema Conversion Tool (SCT) to convert the schema and AWS DMS with full-load + CDC to migrate data with near-zero downtime, then perform a brief cutover.","Use AWS DataSync to transfer Oracle datafiles to AWS and mount on Aurora.","Create a manual pg_dump from Oracle and restore to Aurora PostgreSQL."],

    explanation:"AWS SCT automatically converts Oracle schema to PostgreSQL-compatible DDL, flagging objects that need manual review. AWS DMS then performs a full initial load (while the source database continues serving traffic), then switches to CDC mode to replicate ongoing changes continuously. When replication lag is near-zero (seconds), a brief application cutover (typically 5–15 minutes) completes the migration — well within the 1-hour window. Option A (CSV export) causes 8–16 hours of downtime. Option C — DataSync transfers files, not database-aware migration. Option D (pg_dump from Oracle) isn't valid — pg_dump is a PostgreSQL tool, not Oracle."

    options:["Replace all API calls with synchronous gRPC calls for lower latency.","Use Amazon EventBridge as the event bus, publish shipment events from the source service, and configure rules to route events to individual target services (Lambda, SQS, Step Functions).","Create a central orchestrator Lambda function that calls each of the 200 services in sequence.","Use Amazon Kinesis Data Streams with each service reading from its own shard."],
    correct:1,

    options:["Configure ALBs between each microservice pair for load balancing and retry logic.","Implement custom retry logic in each service codebase.","Use AWS App Mesh with Envoy proxy sidecars deployed alongside each microservice, integrating with X-Ray for distributed tracing.","Use Amazon API Gateway as a gateway for all inter-service communication."],

    options:["Continue with VPC peering but automate creation with CloudFormation.","Implement AWS Transit Gateway — attach all 30 VPCs to a single TGW using resource sharing via AWS RAM, add route tables in each VPC to route traffic via TGW.","Use AWS PrivateLink to create endpoints for each service that needs cross-VPC access.","Enable VPC sharing so all accounts use a single VPC."],

    options:["Deploy EC2 game servers in us-east-1 only and use CloudFront to cache game assets.","Use AWS Global Accelerator with game server endpoints in each region — GA uses anycast to route players to the nearest AWS edge, then the AWS global backbone to reach the nearest game server.","Use Amazon GameLift FlexMatch in us-east-1 with latency-based player matching.","Deploy Route 53 latency routing to direct players to the nearest regional endpoint."],

    options:["EC2 fleet with Auto Scaling processes PDFs sequentially in a single service — simple but has idle costs.","S3 (PDF upload) → SQS → Lambda (text extraction) → SQS → Lambda (classification) → DynamoDB (metadata) → SNS → SES (notification), with each Lambda step having its own DLQ for independent retries.","API Gateway → Lambda orchestrator → parallel Lambda functions for each step using async invocation.","Step Functions Express Workflow with Lambda tasks for each step, S3 trigger to start the workflow."],

    options:["Terminate the compromised instance immediately to stop the threat.","Take an EBS snapshot of the instance volumes for forensic analysis, detach the instance from its current security group and attach a 'quarantine' security group (deny all inbound/outbound), disable the IAM role attached to the instance, and preserve the instance running for memory forensics if needed.","Reboot the instance — this will clear the malicious process.","Change the EC2 instance's public IP address to sever the Tor connection."],

    options:["Deploy EC2 instances at each store location connected via Direct Connect.","Use AWS IoT Greengrass at each store — runs Lambda functions locally for POS processing, stores data locally, and syncs to AWS IoT Core / S3 when connectivity restores.","Use AWS Local Zones at each store for local AWS infrastructure.","Configure S3 Transfer Acceleration to fast-sync store data when internet is restored."],

  {

    question:"Which combination of optimisations provides the FASTEST cost reduction?",
    options:["Do nothing — cloud costs always increase as the company grows.","Schedule EC2 instance stop/start using AWS Instance Scheduler for weekends (saves ~40% of EC2 cost); right-size RDS using AWS Compute Optimizer recommendations; review and optimise data transfer by keeping traffic within the same AZ or using VPC endpoints.","Purchase 3-year Reserved Instances for all EC2 and RDS at current over-provisioned sizes.","Move all EC2 instances to Spot to immediately reduce the bill by 70%."],
    correct:1,
    explanation:"This multi-pronged approach targets the three largest cost drivers. Instance Scheduler stops idle EC2 over weekends (saving ~16% of monthly EC2 spend: 2/7 days × 40% idle). Right-sizing RDS from 3x over-provisioned to right-sized typically reduces RDS costs 50–70%. Optimising data transfer (same-AZ traffic, VPC endpoints for AWS services) reduces the 25% data transfer component. Total potential savings: 30–50% of the total bill. Option C (RIs at current sizes) locks in over-provisioned costs for 3 years. Option D (all Spot) is inappropriate for stateful workloads like RDS and business-critical EC2."

    options:["Deploy an NGINX reverse proxy on EC2 with custom rate-limiting configuration.","Use Amazon API Gateway with usage plans — define throttle limits per tier, create API keys for each partner, associate keys with the appropriate usage plan, and use API Gateway's built-in metrics for usage tracking.","Use AWS WAF rate-based rules to throttle requests at the CloudFront level.","Deploy an ALB with target group weighting to distribute load by partner tier."],

    options:["Put the CDE in a separate VPC, enable CloudTrail and Config, use Amazon Inspector for vulnerability scanning, and deploy AWS Security Hub with the PCI DSS standard for automated compliance checks.","Submit a written policy document stating that the CDE is secure.","Encrypt all CDE data with SSE-S3 and call it compliant.","Use Amazon Macie to detect credit card numbers in S3 logs."],

  {

    question:"Which optimisation reduces BOTH timeouts and costs?",
    options:["Increase Lambda timeout to 15 minutes to prevent timeouts.","Use AWS Batch for image processing — containers on EC2 Spot are optimal for batch, long-running jobs; reserve Lambda for short, event-driven tasks.","Use Lambda with Provisioned Concurrency to pre-warm 10,000 concurrent executions.","Increase Lambda memory to 10 GB for faster image processing."],
    correct:1,
    explanation:"AWS Batch is designed for exactly this type of batch processing workload. It queues the 10,000 jobs, processes them on EC2 Spot instances (up to 90% cheaper than On-Demand), manages job scheduling, retries, and monitoring. 45-second jobs are well-suited to containers on EC2 — Lambda's serverless model (pay per 100ms) becomes expensive for many long-running concurrent executions. Option A (extend timeout) prevents timeouts but doesn't address cost. Option C (Provisioned Concurrency for 10,000) is extremely expensive — pre-warming 10,000 concurrent Lambdas costs regardless of load. Option D (more memory) speeds up processing slightly but doesn't address the fundamental cost and architecture issue."

    options:["Use /28 subnets per tier per AZ — provides 14 usable IPs each, enough for near-term needs.","Use a /16 VPC CIDR (65,536 IPs), carve /20 subnets per tier per AZ (4,096 IPs each) — provides growth headroom across 9 subnets (3 tiers × 3 AZs).","Use a /24 VPC CIDR (256 IPs total) — sufficient for the planned 500 instances per tier.","Use public IPs for all instances to avoid private subnet complexity."],

  {
    domain:"Data Replication",
    type:"hybrid",
    scenario:"A company replicates data from on-premises PostgreSQL (primary) to Amazon RDS PostgreSQL (reporting replica) using logical replication. Replication lag is consistently 2 hours. Analytics teams need near-real-time data (lag < 5 minutes).",
    question:"What is the MOST effective way to reduce replication lag?",
    options:["Increase the RDS replica instance size — more compute will process replication faster.","Analyse the replication slot on the source for unconsumed WAL; optimise large transactions by breaking them into smaller batches; upgrade the Direct Connect bandwidth from 1 Gbps to 10 Gbps if bandwidth is the bottleneck; and ensure the RDS replica's max_worker_processes supports parallel apply.","Switch from logical replication to AWS DMS continuous replication.","Take hourly RDS snapshots and restore them on the analytics instance."],
    correct:1,
    explanation:"Replication lag in logical replication has multiple causes. Unconsumed WAL accumulates if the replica can't apply changes fast enough — large transactions (bulk loads) are a common cause. Breaking large transactions into smaller batches reduces individual transaction apply time. If bandwidth is saturated (2 hours of lag at 1 Gbps), upgrading Direct Connect bandwidth unblocks the pipeline. Parallel apply workers (max_worker_processes) allow multiple replication workers to apply changes concurrently in PostgreSQL 10+. Option A (more compute) helps if CPU is the bottleneck but doesn't address WAL accumulation or bandwidth. Option C (DMS) would require reconfiguring the replication — significant overhead. Option D (hourly snapshots) gives 1-hour lag minimum — much worse than the 5-minute target."

  {

    type:"cloud",
    scenario:"A Lambda function accesses DynamoDB, S3, and sends emails via SES. Currently the Lambda execution role has AmazonDynamoDBFullAccess, AmazonS3FullAccess, and AmazonSESFullAccess. A security review flags this as over-permissioned.",
    question:"What is the MOST SECURE least-privilege IAM policy for this Lambda function?",
    options:["Replace all managed policies with a single policy granting only the specific actions on specific resources: dynamodb:GetItem, dynamodb:PutItem on the specific table ARN; s3:GetObject, s3:PutObject on the specific bucket/prefix ARN; ses:SendEmail on specific identity ARNs.","Keep the existing policies — they are AWS managed and therefore safe.","Replace with PowerUserAccess — less than AdministratorAccess.","Use a single AmazonDynamoDBReadOnlyAccess policy for all resources."],
    correct:0,
    explanation:"True least privilege means granting only the specific IAM actions the function actually uses on the specific resource ARNs it accesses. dynamodb:GetItem and PutItem on one specific table ARN; s3:GetObject and PutObject on one specific bucket and prefix; ses:SendEmail on one verified identity. If the Lambda's execution role is compromised, the blast radius is limited to those exact resources and actions. Option B (keep existing) grants full access to ALL DynamoDB tables, ALL S3 buckets, and ALL SES operations in the account. Option C (PowerUserAccess) grants nearly all AWS service access — completely wrong. Option D (DynamoDB ReadOnly) doesn't grant the write or SES permissions the function needs."
  },
  {
    domain:"Hybrid Workload",
    type:"hybrid",
    scenario:"An insurance company runs a legacy claims processing mainframe on-premises. They want to gradually modernise by moving new features to AWS Lambda, while the mainframe handles existing claims. Lambda functions need to call mainframe APIs and vice versa.",

    options:["Directly expose mainframe APIs over the public internet for Lambda to call.","Deploy API Gateway as a façade in front of Lambda; use Amazon MQ (RabbitMQ) as an event bus between AWS and the mainframe (mainframe publishes/subscribes to MQ queues over Direct Connect); Lambda consumes from MQ for mainframe events and publishes to MQ for mainframe-bound requests.","Rewrite the mainframe in Java and deploy on EC2 immediately.","Use AWS DataSync to synchronise files between the mainframe and S3 as the integration mechanism."],
    correct:1,

  {

    question:"Which storage strategy maintains compliance while MINIMISING cost?",
    options:["Delete logs older than 1 year — 7-year retention is not commonly enforced.","Configure S3 Lifecycle policies on the CloudTrail bucket: S3 Standard (0–30 days) → S3 Standard-IA (31–90 days) → S3 Glacier Instant Retrieval (91 days–1 year) → S3 Glacier Flexible Retrieval (1–7 years). Enable S3 Object Lock (WORM) with a 7-year retention period to prevent deletion.","Compress logs and store in EBS volumes — cheaper than S3 Standard.","Copy logs to on-premises tape storage after 30 days."],
    correct:1,
    explanation:"S3 Lifecycle tiering dramatically reduces storage costs while maintaining the 7-year retention. S3 Glacier Flexible Retrieval (Expedited) retrieves objects in 1–5 minutes; Standard retrieval is 3–5 hours — both within the 12-hour auditor requirement. S3 Object Lock with Compliance mode (WORM) prevents any user — including root — from deleting or modifying logs, satisfying immutability requirements. Cost: S3 Glacier is ~$0.004/GB vs S3 Standard $0.023/GB — ~80% cost reduction. Option A is non-compliant. Option C (EBS) is more expensive than S3 and lacks lifecycle management. Option D (tape) introduces on-premises infrastructure and tape retrieval can exceed 12 hours."

  {

    explanation:"Fargate eliminates bin-packing entirely because there are no EC2 instances to manage. Each ECS task declares its required vCPU and memory, and Fargate provisions exactly that — no more, no less. There's never a deployment failure due to insufficient EC2 capacity. Option A (manual tracking) is operationally intensive and doesn't scale. Option C (capacity providers with ASG) improves EC2 management but doesn't eliminate bin-packing — tasks still compete for EC2 resources. Option D (EKS) changes the orchestrator but doesn't eliminate the bin-packing problem unless Fargate is also used with EKS."

  {

    question:"Which practice BEST ensures DR plans are accurate and effective?",
    options:["Review the DR documentation annually and update theoretical RTO/RPO figures.","Implement regular DR drills using AWS GameDays or automated runbooks (AWS Systems Manager), test the full recovery procedure in a staging environment quarterly, measure actual RTO/RPO, document gaps, and update the DR plan based on findings.","Increase the documented RTO from 2 hours to 8 hours to account for delays.","Purchase AWS Business Support so AWS assists during actual disasters."],
    correct:1,
    explanation:"The only way to validate a DR plan is to test it. Regular DR drills (GameDays) exercise the full recovery procedure — RDS restore, network configuration, application startup — in a staging environment. Measuring actual RTO exposes gaps (like the network configuration issue) before a real disaster. Systems Manager runbooks automate the recovery steps, reducing human error. Option A (annual document review) caught the network issue only during a real disaster. Option C (increase RTO) is capitulating to poor DR performance, not fixing it. Option D (AWS Support) assists during incidents but doesn't validate your DR plan."

  {

    options:["Create separate S3 buckets for sensitive and non-sensitive data and use bucket policies.","Use AWS Lake Formation with column-level security — grant column permissions to the HR manager group only, restrict data analyst permissions to exclude sensitive columns; both groups use the same Athena tables.","Create separate Athena views for each group that exclude sensitive columns.","Encrypt sensitive columns differently and distribute decryption keys only to HR managers."],
    correct:1,
    explanation:"AWS Lake Formation provides fine-grained access control (database, table, column, row, and cell level) for data lake resources. Column-level grants allow HR managers to see salary and performance columns while data analysts see only non-sensitive columns — from the same table, no data duplication. Lake Formation enforces this transparently for Athena queries. Option A (separate buckets) requires duplicating data and syncing. Option C (Athena views) can achieve column restriction but doesn't centralise governance — anyone with sufficient permissions can bypass the view and query the table directly. Lake Formation enforces at the metadata layer. Option D (encryption) is complex and operationally difficult to manage at column level."

  {

    options:["Manually document each server's specs and dependencies in a spreadsheet.","Use AWS Application Discovery Service — deploy the Discovery Agent (agentless Discovery Connector for VMware, or agent-based) to collect CPU, memory, network, and process data; use Migration Hub to analyse dependencies and group into migration waves.","Use AWS Config to discover all EC2 instances and network connections.","Deploy AWS Systems Manager Inventory to collect server metadata."],
    correct:1,
    explanation:"AWS Application Discovery Service (ADS) is built for exactly this migration assessment scenario. The Discovery Agent collects server performance data (CPU, memory, disk, network), running processes, and network connections to map inter-server dependencies. Data flows into AWS Migration Hub where workloads are grouped into migration waves based on dependencies. Option A (spreadsheet) is manual, error-prone, and doesn't capture runtime dependencies. Option C (AWS Config) tracks AWS resource configurations — not on-premises servers. Option D (Systems Manager Inventory) collects software inventory but requires SSM Agent installation and an IAM role — designed for AWS instances, not on-premises servers without AWS connectivity."

  {
    domain:"Well-Architected Security",
    type:"cloud",
    scenario:"A developer accidentally committed AWS access keys to a public GitHub repository 10 minutes ago. The keys belong to an IAM user with AdministratorAccess. The keys may have already been harvested by automated scanners.",
    question:"What is the CORRECT immediate response in the right sequence?",
    options:["Email the developer and ask them to delete the commit.","1) Immediately deactivate (disable) the IAM access key in the IAM console; 2) Review CloudTrail for API calls made with the key in the past 10 minutes; 3) Rotate all credentials for the affected IAM user; 4) Review and remediate any resources created or modified by the key; 5) Enable GuardDuty if not already enabled for ongoing monitoring; 6) Remove the commit from GitHub history.","Change the IAM user's console password.","Wait to see if any suspicious activity occurs before taking action."],
    correct:1,
    explanation:"This is the AWS-recommended credential compromise response sequence. Deactivating the key immediately stops any ongoing abuse. CloudTrail review identifies what, if anything, was done with the key in the 10-minute window. Credential rotation creates new keys, making the compromised key permanently useless even if reactivated. Resource remediation reverses any damage. GuardDuty provides ongoing monitoring for continued suspicious activity. Removing from GitHub history prevents future discovery. Option A (email developer) is too slow — automated scanners harvest keys within seconds of public exposure. Option C (change password) doesn't affect API key access. Option D (wait) allows ongoing exploitation."

  {
    domain:"RDS Architecture",

    options:["Add 5 more RDS read replicas (10 total).","Add Amazon ElastiCache for Redis in front of the application — cache frequent read queries (which are likely repeated) to reduce the load on all read replicas; investigate and optimise the most expensive queries using Performance Insights.","Upgrade all read replica instance types to a larger compute class.","Migrate reads to DynamoDB."],
    correct:1,
    explanation:"90% CPU on read replicas indicates the queries themselves are expensive (complex joins, large result sets, unoptimised queries) — adding more replicas just adds more instances running the same expensive queries. ElastiCache Redis caches query results: a cached query response takes microseconds and costs 0 CPU on RDS. Performance Insights identifies the top SQL queries by load — optimising the top 5 expensive queries often reduces database CPU by 40–80%. Option A (more replicas) scales horizontally but doesn't fix the underlying query performance issue. Option C (upgrade instance type) gives more CPU but adds cost without addressing query inefficiency. Option D (migrate to DynamoDB) is a significant re-architecture requiring schema redesign."
  },
  {
    domain:"Hybrid Storage",
    type:"hybrid",
    scenario:"A life sciences company generates 200 TB of genomic data monthly from on-premises sequencers. Data must be processed in AWS (compute is expensive on-premises). They have a 1 Gbps internet link shared across the organisation and cannot disrupt other business traffic.",
    question:"Which approach transfers 200 TB monthly to AWS without saturating the shared internet link?",
    options:["Use AWS DataSync over the 1 Gbps internet link with QoS bandwidth throttling.","Order AWS Snowball Edge devices each month — load data, ship to AWS, ingest into S3. Use DataSync for small incremental transfers during the month.","Upgrade internet connectivity to 10 Gbps dedicated for genomics.","Use S3 Transfer Acceleration to maximise use of the existing 1 Gbps connection."],
    correct:1,
    explanation:"200 TB at 100% of 1 Gbps takes ~18 days — sharing the link makes it longer and disrupts other business. Snowball Edge (80 TB usable each) requires 3 devices, shipped monthly. Data is loaded on-premises without using any internet bandwidth, then shipped to AWS for direct S3 ingest. DataSync handles smaller incremental updates (new files created since the Snowball was shipped). Option A (DataSync with throttling) would take weeks even with the full 1 Gbps, and throttling makes it longer, affecting the monthly data cycle. Option C (10 Gbps upgrade) is expensive, takes months to provision, and 200 TB at 10 Gbps still takes 1.8 days at full utilisation. Option D (Transfer Acceleration) improves speed but doesn't solve the bandwidth-sharing problem."
  },
  {
    domain:"WAF & DDoS",
    type:"cloud",
    scenario:"A financial services website suffered a Layer 7 DDoS attack — attackers sent 100,000 HTTP POST requests per second to the /login endpoint with valid-looking payloads. CloudFront absorbed the attack but the origin ALB and application servers were overwhelmed.",
    question:"Which combination of services prevents the origin from being overwhelmed in future attacks?",
    options:["Scale up EC2 instances behind the ALB to handle 100,000 req/sec.","Enable AWS Shield Advanced on the CloudFront distribution; configure AWS WAF with a rate-based rule limiting /login POSTs to 1,000 req/5min per IP; use WAF Bot Control to identify automated traffic; set CloudFront's origin request limit to block traffic exceeding application capacity.","Block all POST requests at the CloudFront level using a WAF geographic restriction.","Use Amazon GuardDuty to detect and automatically block attacking IPs."],
    correct:1,
    explanation:"Shield Advanced provides DDoS protection with AWS DRT (DDoS Response Team) support and cost protection during attacks. WAF rate-based rules on /login limit per-IP POST rates (stopping credential stuffing automatically). Bot Control identifies and blocks bot traffic before it reaches the origin. CloudFront's origin shield limits the number of requests forwarded to the origin, protecting the ALB. This layered defence stops attacks at the edge. Option A (scaling up) plays into the attacker's hands — it's more expensive and doesn't stop the attack. Option C (block all POSTs) would break legitimate logins. Option D (GuardDuty) detects threats but doesn't automatically block HTTP-level attacks."
  },
  {
    domain:"Step Functions",
    type:"cloud",
    scenario:"A loan approval workflow has 12 steps: identity verification, credit check, fraud screening, property valuation, underwriter review (human), legal review (human), approval, document generation, e-signature, fund disbursement, notification, audit logging. Human steps may take 3–5 days.",
    question:"Which AWS service orchestrates this long-running workflow with human approval steps?",
    options:["Use a single Lambda function with a state machine embedded in code using if/else logic.","Use AWS Step Functions Standard Workflow — supports human approval via .waitForTaskToken pattern (pauses execution for up to 1 year awaiting an external callback), integrates Lambda for automated steps, and provides full execution history and visual debugging.","Use Amazon SQS with a different queue for each step, and a Lambda polling each queue.","Use Amazon EventBridge Scheduler to trigger each step at timed intervals."],
    correct:1,
    explanation:"Step Functions Standard Workflow is purpose-built for long-running workflows. The .waitForTaskToken integration pattern pauses a step's execution indefinitely (up to 1 year) until an external system calls SendTaskSuccess or SendTaskFailure with the task token — perfect for 3–5 day human review steps. Automated steps use Lambda or SDK integrations. Full execution history is preserved. Option A (Lambda with if/else) cannot pause execution for 3–5 days — Lambda has a maximum 15-minute timeout. Option C (SQS per step) is complex state management without visual debugging or built-in retry. Option D (EventBridge Scheduler) is for triggering at fixed times, not conditional, event-driven workflows."
  },
  {
    domain:"Performance Efficiency",
    type:"cloud",
    scenario:"A machine learning inference service uses c5.18xlarge instances (72 vCPU, 144 GB RAM) for CPU-based inference. Model inference takes 800ms on CPU. The team needs to reduce inference latency to under 100ms to meet SLA requirements.",
    question:"Which approach reduces inference latency to under 100ms?",
    options:["Add more c5.18xlarge instances behind the ALB — horizontal scaling reduces per-instance load.","Switch to GPU-accelerated inference using g4dn instances with AWS-compiled models using Amazon SageMaker Neo or TensorRT; GPU inference for many models is 10–50x faster than CPU.","Use ElastiCache to cache inference results for repeated identical inputs.","Increase CPU instance size to c5.metal (96 vCPU) for more cores."],
    correct:1,
    explanation:"800ms CPU inference vs <100ms target requires a fundamentally different compute approach. GPU instances (g4dn.xlarge with NVIDIA T4) with optimised model compilation (SageMaker Neo compiles models for the target hardware; TensorRT optimises for GPU inference) typically achieve 10–50x latency improvements for neural network inference. This reliably brings 800ms to 16–80ms. Option A (more instances) doesn't reduce per-request latency — just throughput. Option C (caching) helps only for repeated identical inputs — inference is usually on unique inputs. Option D (larger CPU) — going from 72 to 96 cores gives at best 30% improvement — far short of the 8x improvement needed."
  }
];

let userAnswers = new Array(questions.length).fill(null);
let activeFilter = 'all';

function init() {
  renderQuestions();
  updateStats();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  const filtered = questions.map((q, i) => ({q, i})).filter(({q}) => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'hybrid') return q.type === 'hybrid';
    if (activeFilter === 'cloud') return q.type === 'cloud';
    if (activeFilter === 'correct') return userAnswers[questions.indexOf(q)] === q.correct;
    if (activeFilter === 'wrong') return userAnswers[questions.indexOf(q)] !== null && userAnswers[questions.indexOf(q)] !== q.correct;
    if (activeFilter === 'unanswered') return userAnswers[questions.indexOf(q)] === null;
    return true;
  });

  // Section labels
  let lastType = null;

  filtered.forEach(({q, i}) => {
    if (activeFilter === 'all' && q.type !== lastType) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.innerHTML = `<span class="section-line"></span><span>${q.type === 'hybrid' ? '⬡ On-Premises & Hybrid' : '☁ Cloud-Native'}</span><span class="section-line"></span>`;
      container.appendChild(label);
      lastType = q.type;
    }

    const ua = userAnswers[i];
    const isAnswered = ua !== null;
    const isCorrect = ua === q.correct;

    let statusBadge = `<span class="q-status-badge status-unanswered">Unanswered</span>`;
    if (isAnswered && isCorrect) statusBadge = `<span class="q-status-badge status-correct">✓ Correct</span>`;
    if (isAnswered && !isCorrect) statusBadge = `<span class="q-status-badge status-wrong">✗ Wrong</span>`;

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${i}`;

    const opts = q.options.map((opt, oi) => {
      let cls = 'opt';
      let icon = '';
      if (isAnswered) {
        cls += ' disabled';
        if (oi === q.correct) { cls += ' reveal'; icon = '<span class="opt-icon">✓</span>'; }
        if (oi === ua && oi !== q.correct) { cls += ' wrong'; icon = '<span class="opt-icon">✗</span>'; }
        if (oi === ua && oi === q.correct) { cls += ' correct'; icon = '<span class="opt-icon">✓</span>'; }
      }
      const letter = String.fromCharCode(65 + oi);
      return `<div class="${cls}" onclick="answer(${i}, ${oi})">
        <span class="opt-letter">${letter}</span>
        <span>${opt}</span>
        ${icon}
      </div>`;
    }).join('');

    const expClass = isAnswered ? 'explanation show' : 'explanation';
    const expColor = isAnswered ? (isCorrect ? 'var(--correct)' : 'var(--wrong)') : 'var(--accent)';

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">Q${i + 1}</div>
        <div class="q-meta">
          <div class="q-domain">${q.domain}</div>
        </div>
        ${statusBadge}
      </div>
      <div class="q-scenario">
        <div class="scenario-label">Scenario</div>
        ${q.scenario}
      </div>
      <div class="q-question">${q.question}</div>
      <div class="q-options">${opts}</div>
      <div class="${expClass}" id="exp-${i}">
        <div class="exp-label" style="color:${expColor}">${isAnswered ? (isCorrect ? '✓ Correct' : '✗ Incorrect') : 'Explanation'}</div>
        <div class="exp-body">${q.explanation}</div>
      </div>
    `;
    container.appendChild(card);
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);font-size:14px;">No questions match this filter.</div>';
  }
}

function answer(qIndex, optIndex) {
  if (userAnswers[qIndex] !== null) return;
  userAnswers[qIndex] = optIndex;

  // Re-render just this card
  const q = questions[qIndex];
  const isCorrect = optIndex === q.correct;

  const card = document.getElementById(`q-${qIndex}`);
  // Update badge
  const badge = card.querySelector('.q-status-badge');
  if (isCorrect) {
    badge.className = 'q-status-badge status-correct';
    badge.textContent = '✓ Correct';
  } else {
    badge.className = 'q-status-badge status-wrong';
    badge.textContent = '✗ Wrong';
  }

  // Update options
  const opts = card.querySelectorAll('.opt');
  opts.forEach((el, oi) => {
    el.classList.add('disabled');
    el.onclick = null;
    const icon = document.createElement('span');
    icon.className = 'opt-icon';
    if (oi === q.correct) { el.classList.add('reveal'); icon.textContent = '✓'; el.appendChild(icon); }
    if (oi === optIndex && oi !== q.correct) { el.classList.add('wrong'); icon.textContent = '✗'; el.appendChild(icon); }
    if (oi === optIndex && oi === q.correct) { el.classList.add('correct'); }
  });

  // Show explanation
  const exp = document.getElementById(`exp-${qIndex}`);
  exp.classList.add('show');
  const label = exp.querySelector('.exp-label');
  label.style.color = isCorrect ? 'var(--correct)' : 'var(--wrong)';
  label.textContent = isCorrect ? '✓ Correct' : '✗ Incorrect — Correct answer highlighted above';

  updateStats();
  checkCompletion();
}

function updateStats() {
  const answered = userAnswers.filter(a => a !== null).length;
  const correct = userAnswers.filter((a, i) => a === questions[i].correct).length;
  const pct = answered === 0 ? 0 : Math.round((correct / answered) * 100);

  document.getElementById('ans-count').textContent = answered;
  document.getElementById('score-count').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `${answered} / ${questions.length} answered`;
  document.getElementById('prog-pct').textContent = Math.round((answered / questions.length) * 100) + '%';
  document.getElementById('prog-fill').style.width = (answered / questions.length * 100) + '%';
}

function checkCompletion() {
  const answered = userAnswers.filter(a => a !== null).length;
  if (answered === questions.length) {
    showScore();
  }
}

function showScore() {
  const correct = userAnswers.filter((a, i) => a === questions[i].correct).length;
  const wrong = userAnswers.filter((a, i) => a !== null && a !== questions[i].correct).length;
  const skipped = userAnswers.filter(a => a === null).length;
  const pct = Math.round((correct / questions.length) * 100);

  let grade = '';
  let color = '';
  if (pct >= 80) { grade = '🏆 Excellent — Ready for the exam!'; color = 'var(--correct)'; }
  else if (pct >= 70) { grade = '📈 Good — Review weak areas'; color = 'var(--accent)'; }
  else if (pct >= 60) { grade = '📚 Needs improvement — Study more'; color = '#f59e0b'; }
  else { grade = '⚠ More preparation needed'; color = 'var(--wrong)'; }

  const panel = document.getElementById('score-panel');
  panel.classList.add('show');
  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('final-pct').style.color = color;
  document.getElementById('final-grade').textContent = grade;
  document.getElementById('fs-correct').textContent = correct;
  document.getElementById('fs-wrong').textContent = wrong;
  document.getElementById('fs-skip').textContent = skipped;
  document.getElementById('fs-pct').textContent = pct + '%';

  panel.scrollIntoView({ behavior: 'smooth' });
}

function resetExam() {
  userAnswers = new Array(questions.length).fill(null);
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
  document.getElementById('score-panel').classList.remove('show');
  updateStats();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-filter') === f);
  });
  renderQuestions();
}

// Filter bar
const filterBar = document.createElement('div');
filterBar.className = 'filter-bar';
const filters = [
  { label: 'All (50)', val: 'all' },
  { label: 'Hybrid / On-Prem', val: 'hybrid' },
  { label: 'Cloud-Native', val: 'cloud' },
  { label: 'Unanswered', val: 'unanswered' },
  { label: '✓ Correct', val: 'correct' },
  { label: '✗ Wrong', val: 'wrong' },
];
filters.forEach(f => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (f.val === 'all' ? ' active' : '');
  btn.setAttribute('data-filter', f.val);
  btn.textContent = f.label;
  btn.onclick = () => setFilter(f.val);
  filterBar.appendChild(btn);
});
document.getElementById('questions-container').before(filterBar);

init();
</script>
</body>
</html>
